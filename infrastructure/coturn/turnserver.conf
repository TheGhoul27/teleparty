# coturn configuration for WatchShare.
#
# Uses the "use-auth-secret" (REST API) mode: the signaling server mints
# short-lived credentials with the same shared secret, so no static TURN
# passwords ever ship to browsers.
#
# Replace every <PLACEHOLDER> before deploying.

listening-port=3478
tls-listening-port=5349

# Public IP of the TURN host (required behind NAT).
# external-ip=<PUBLIC_IP>/<PRIVATE_IP>

realm=<YOUR_DOMAIN>
server-name=<YOUR_DOMAIN>

# Must match TURN_STATIC_AUTH_SECRET on the signaling server.
use-auth-secret
static-auth-secret=<LONG_RANDOM_SECRET>

# TLS for turns: (recommended). Provision certificates with certbot or similar.
# cert=/etc/letsencrypt/live/<YOUR_DOMAIN>/fullchain.pem
# pkey=/etc/letsencrypt/live/<YOUR_DOMAIN>/privkey.pem

fingerprint
lt-cred-mech

# Relay port range - open these in the firewall (UDP).
min-port=49152
max-port=65535

# Hardening.
no-cli
no-tlsv1
no-tlsv1_1
denied-peer-ip=0.0.0.0-0.255.255.255
denied-peer-ip=10.0.0.0-10.255.255.255
denied-peer-ip=100.64.0.0-100.127.255.255
denied-peer-ip=127.0.0.0-127.255.255.255
denied-peer-ip=169.254.0.0-169.254.255.255
denied-peer-ip=172.16.0.0-172.31.255.255
denied-peer-ip=192.168.0.0-192.168.255.255
no-multicast-peers

# Quotas keep a single room from saturating the relay.
user-quota=12
total-quota=1200
