# Local development stack: web + signaling + redis + optional coturn.
# Everything is ephemeral by design - rooms and chat live in memory and
# disappear when the room closes. Redis is only needed for multi-instance
# scaling; the signaling server falls back to in-memory when REDIS_URL is unset.

services:
  web:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.web
      args:
        NEXT_PUBLIC_SIGNALING_URL: http://localhost:4000
    ports:
      - "3000:3000"
    depends_on:
      signaling:
        condition: service_healthy

  signaling:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.signaling
    ports:
      - "4000:4000"
    environment:
      NODE_ENV: production
      PORT: "4000"
      ALLOWED_ORIGINS: http://localhost:3000
      REDIS_URL: redis://redis:6379
      ROOM_TOKEN_SECRET: ${ROOM_TOKEN_SECRET:-local-dev-secret-change-in-production}
      STUN_URLS: stun:stun.l.google.com:19302
      TURN_URL: ${TURN_URL:-}
      TURN_STATIC_AUTH_SECRET: ${TURN_STATIC_AUTH_SECRET:-}
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:4000/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # TURN relay for restrictive networks. See infrastructure/coturn/.
  coturn:
    image: coturn/coturn:4.6
    network_mode: host
    volumes:
      - ./infrastructure/coturn/turnserver.conf:/etc/coturn/turnserver.conf:ro
    profiles: ["turn"]
